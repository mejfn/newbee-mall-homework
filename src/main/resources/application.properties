# 1. 端口改成8081，和之前的mall 8080完全不冲突
server.port=8081
spring.thymeleaf.cache=false
spring.datasource.name=newbee-mall-datasource
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# 2. 数据库URL：加了allowPublicKeyRetrieval=true，解决MySQL8公钥问题，库名和你建的newbee_mall_db一致
spring.datasource.url=jdbc:mysql://localhost:3306/newbee_mall_db?useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
# 3. 把这里改成你自己的MySQL密码！！！
spring.datasource.password=root

# 连接池配置（不用改，保持原样）
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.pool-name=hikariCP
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
# mybatis.hikari.connection-test-query=SELECT 1

# mybatis config（不用改）
mybatis.mapper-locations=classpath:mapper/*Mapper.xml